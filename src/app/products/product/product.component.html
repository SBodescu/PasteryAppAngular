<app-card>
  <h2>{{ product.name }}</h2>
  <p class="category">{{ product.category }}</p>
  <img class="product-image" [src]="product.image_url" [alt]="product.name" />
  <div class="product-info">
    <p class="description">{{ product.description }}</p>
    <p class="price">{{ product.price }}</p>
  </div>
</app-card>
