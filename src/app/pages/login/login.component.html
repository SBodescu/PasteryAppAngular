<div class="login-container">
  <form (ngSubmit)="onSubmit()" class="login-form">
    <h2>Login</h2>
    <div class="input-group">
      <input
        type="email"
        placeholder="Email"
        required
        [(ngModel)]="email"
        name="email"
      />
    </div>
    <div class="input-group">
      <input
        type="password"
        placeholder="Password"
        required
        [(ngModel)]="password"
        name="password"
      />
    </div>
    <button type="submit">Connect</button>
  </form>
</div>
