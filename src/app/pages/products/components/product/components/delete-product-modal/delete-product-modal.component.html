<div class="delete-modal">
  <div class="modal-content">
    <h3>Are you sure you want to delete this product?</h3>
    <div class="modal-actions">
      <button class="confirm-btn" (click)="onConfirm()">Yes, Delete</button>
      <button class="cancel-btn" (click)="onCancel()">No, Cancel</button>
    </div>
  </div>
</div>
